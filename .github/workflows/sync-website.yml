name: Sync raucle.com release content

# Fires automatically on every release tag, and can be re-run manually
# from the Actions tab against any version for backfills or fixes.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version to sync (without leading v), e.g. 0.4.0'
        required: true
        type: string

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out raucle-detect
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Fail fast if WEBSITE_SYNC_TOKEN is missing
        env:
          TOKEN: ${{ secrets.WEBSITE_SYNC_TOKEN }}
        run: |
          if [[ -z "$TOKEN" ]]; then
            echo "::error::WEBSITE_SYNC_TOKEN secret is not configured."
            echo "Add a fine-grained PAT with contents:write + pull-requests:write on craigamcw/raucle.com"
            echo "at: https://github.com/craigamcw/raucle-detect/settings/secrets/actions"
            exit 1
          fi

      - name: Determine release version
        id: version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "branch_name=release-v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Syncing version: v${VERSION}"

      - name: Check out raucle.com
        uses: actions/checkout@v4
        with:
          repository: craigamcw/raucle.com
          token: ${{ secrets.WEBSITE_SYNC_TOKEN }}
          path: website
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Sync release content
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          python scripts/sync_website.py \
            --changelog CHANGELOG.md \
            --version "$VERSION" \
            --website-html website/index.html

      - name: Configure git
        working-directory: website
        run: |
          git config user.name "raucle-detect-bot"
          git config user.email "oss@raucle.io"

      - name: Push branch and open PR
        working-directory: website
        env:
          GH_TOKEN: ${{ secrets.WEBSITE_SYNC_TOKEN }}
          BRANCH: ${{ steps.version.outputs.branch_name }}
          VERSION: ${{ steps.version.outputs.version }}
          EVENT_NAME: ${{ github.event_name }}
          RUN_ID: ${{ github.run_id }}
        run: |
          if git diff --quiet; then
            echo "No changes to commit — website already in sync."
            exit 0
          fi

          # Idempotent: reuse the branch name per version so re-runs update
          # the same PR instead of opening duplicates.
          git checkout -B "$BRANCH"
          git add index.html

          # Build commit message in a file to avoid YAML/shell quoting issues.
          {
            printf 'Sync release v%s content from raucle-detect\n\n' "$VERSION"
            printf 'Automated update from raucle-detect tag push.\n\n'
            printf 'Source: https://github.com/craigamcw/raucle-detect/blob/v%s/CHANGELOG.md\n' "$VERSION"
          } > /tmp/commit-msg.txt

          git commit -F /tmp/commit-msg.txt
          git push -u origin "$BRANCH" --force-with-lease

          # Build PR body in a file too.
          changelog_url="https://github.com/craigamcw/raucle-detect/blob/v${VERSION}/CHANGELOG.md"
          workflow_url="https://github.com/craigamcw/raucle-detect/actions/runs/${RUN_ID}"
          {
            printf 'Automated update from raucle-detect tag push.\n\n'
            printf 'This PR regenerates the open-source-section content between '
            printf 'the `RAUCLE_DETECT:*` markers in `index.html`. The content '
            printf 'is sourced from the `v%s` section of [CHANGELOG.md](%s).\n\n' "$VERSION" "$changelog_url"
            printf -- '- **Release badge** updated to v%s\n' "$VERSION"
            printf -- '- **Features list** regenerated from headline bullets\n'
            printf -- "- **What's new callout** updated with section titles + changelog link\n\n"
            printf 'Triggered by: `%s`\n' "$EVENT_NAME"
            printf 'Workflow: %s\n' "$workflow_url"
          } > /tmp/pr-body.txt

          # Open PR if one doesn't already exist for this branch.
          if gh pr view "$BRANCH" --repo craigamcw/raucle.com >/dev/null 2>&1; then
            echo "PR for $BRANCH already exists — updated in place."
            gh pr view "$BRANCH" --repo craigamcw/raucle.com --json url --jq .url
          else
            gh pr create \
              --repo craigamcw/raucle.com \
              --base main \
              --head "$BRANCH" \
              --title "Sync raucle-detect v${VERSION} release content" \
              --body-file /tmp/pr-body.txt
          fi
