# Publish the four non-Python reference implementations of the Provenance
# Receipt v1 spec to their public registries.
#
# Trigger: push a tag of the form `ref-v<version>` (e.g. `ref-v0.1.0`), or run
# manually via workflow_dispatch. The tag version must match the version in
# each package manifest — the verify job enforces this before anything ships.
#
# Registry credentials (repo secrets; each job is skipped with a clear error
# if its secret is absent rather than failing the others):
#   NPM_TOKEN            — npm automation token for the @raucle org
#   CARGO_REGISTRY_TOKEN — crates.io API token
#   NUGET_API_KEY        — nuget.org API key (Raucle.Provenance push scope)
#
# Go needs no registry: the module proxy serves nested modules straight from a
# git tag named `reference/provenance-go/v<version>`, which the `tag-go-module`
# job pushes (GITHUB_TOKEN, contents: write).

name: Publish reference implementations

on:
  push:
    tags: ["ref-v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (must match the package manifests)"
        required: true

permissions:
  contents: read

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - id: v
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#ref-v}" >> "$GITHUB_OUTPUT"
          fi

  verify:
    # Cross-language conformance + manifest-version agreement gate everything.
    needs: resolve-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - name: Manifest versions must match the tag
        run: |
          V="${{ needs.resolve-version.outputs.version }}"
          fail=0
          ts=$(python3 -c "import json;print(json.load(open('reference/provenance-ts/package.json'))['version'])")
          rs=$(grep -m1 '^version' reference/provenance-rs/Cargo.toml | cut -d'"' -f2)
          cs=$(grep -m1 '<Version>' reference/provenance-cs/src/Raucle.Provenance.csproj | sed -E 's/.*<Version>(.*)<\/Version>.*/\1/')
          for pair in "ts:$ts" "rs:$rs" "cs:$cs"; do
            name="${pair%%:*}"; got="${pair#*:}"
            if [ "$got" != "$V" ]; then echo "::error::$name manifest version $got != tag version $V"; fail=1; fi
          done
          exit $fail
      - uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: '3.12'
      - run: pip install -e ".[dev]"
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: stable
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable branch, 2026-06 pin
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: '8.0.x'
      - name: Install TypeScript reference deps
        working-directory: reference/provenance-ts
        run: npm ci
      - name: Cross-language conformance (all 5 ports must agree)
        run: |
          set -eo pipefail
          python reference/canon_conformance.py
          python reference/conformance.py | tee emit.out
          # Guard against a silent toolchain skip reading as PASS.
          for lang in python go rust typescript csharp; do
            grep -q "$lang" emit.out               || { echo "::error::conformance skipped language '$lang'"; exit 1; }
          done

  publish-npm:
    needs: [resolve-version, verify]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm --provenance attestation
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - name: Require NPM_TOKEN
        run: |
          if [ -z "${{ secrets.NPM_TOKEN }}" ]; then
            echo "::error::NPM_TOKEN secret is not configured"; exit 1
          fi
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          registry-url: https://registry.npmjs.org
      - working-directory: reference/provenance-ts
        run: |
          npm ci
          npm run build
          npm test
          npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-crates:
    needs: [resolve-version, verify]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - name: Require CARGO_REGISTRY_TOKEN
        run: |
          if [ -z "${{ secrets.CARGO_REGISTRY_TOKEN }}" ]; then
            echo "::error::CARGO_REGISTRY_TOKEN secret is not configured"; exit 1
          fi
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable branch, 2026-06 pin
      - working-directory: reference/provenance-rs
        run: |
          cargo test
          cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-nuget:
    needs: [resolve-version, verify]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - name: Require NUGET_API_KEY
        run: |
          if [ -z "${{ secrets.NUGET_API_KEY }}" ]; then
            echo "::error::NUGET_API_KEY secret is not configured"; exit 1
          fi
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: '8.0.x'
      - working-directory: reference/provenance-cs
        run: |
          dotnet test test
          dotnet pack src/Raucle.Provenance.csproj -c Release -o out
          dotnet nuget push "out/*.nupkg" \
            --api-key "${{ secrets.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

  tag-go-module:
    # The Go module proxy serves the nested module from this tag; no registry
    # account or secret is needed beyond the workflow's own token.
    needs: [resolve-version, verify]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - name: Push nested-module tag for the Go proxy
        run: |
          V="${{ needs.resolve-version.outputs.version }}"
          TAG="reference/provenance-go/v${V}"
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "tag ${TAG} already exists; skipping"
            exit 0
          fi
          git tag "${TAG}" "${GITHUB_SHA}"
          git push origin "${TAG}"
