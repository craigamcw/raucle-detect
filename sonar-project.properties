sonar.projectKey=craigamcw_raucle
sonar.organization=craigamcw

# Analyse the code users actually consume: the shipped Python package and the
# language reference implementations. Internal tooling, infra, docs, build
# artefacts and the paper/eval scripts are not the product and must not drive
# the security rating (e.g. a DLP test that *deliberately* contains a fake
# credential, or a paper-draft helper that writes to an operator-supplied path).
sonar.sources=raucle,reference
sonar.tests=tests

# Test fixtures intentionally contain insecure-looking inputs (fake tokens,
# bidirectional unicode, http/ftp URLs) because they exercise the detectors.
sonar.exclusions=paper/**,scripts/**,deploy/**,plugins/**,examples/**,dist/**,assets/**,docs/**,standards/**,rules/**,**/node_modules/**,**/target/**,**/.lake/**,**/__pycache__/**
sonar.test.inclusions=tests/**

sonar.python.version=3.11, 3.12, 3.13
sonar.python.coverage.reportPaths=coverage.xml
sonar.sourceEncoding=UTF-8
