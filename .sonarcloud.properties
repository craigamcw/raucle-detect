# Read by SonarQube Cloud *Automatic Analysis* (the GitHub-App scan).
# NOTE: Automatic Analysis reads THIS file, not sonar-project.properties
# (which only applies to CI-based analysis). Only the keys below are supported.
#
# Scope to the code users actually consume: the shipped Python package and the
# language reference implementations. Out of scope are tests (their only findings
# are intentional fixtures — fake tokens / bidirectional unicode that exist to
# exercise the detectors), the paper/eval helper scripts, internal tooling/infra,
# and dependency manifests (lock-file reproducibility nags; a library declares
# version ranges rather than pinning an application lock).
sonar.sources=raucle_detect,reference
sonar.exclusions=**/go.mod,**/Cargo.toml,**/package.json
sonar.sourceEncoding=UTF-8
